name: KQL Drift Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  check-kql-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run check:kql-drift
