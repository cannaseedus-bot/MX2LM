<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <radialGradient id="orbGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f9fafb" stop-opacity="1"/>
      <stop offset="40%" stop-color="#e5e7eb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.0"/>
    </radialGradient>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="260" height="260" rx="32" fill="url(#bgGrad)"/>

  <!-- Micronaut hex frame -->
  <g transform="translate(130,130)" filter="url(#softShadow)">
    <polygon
      points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45"
      fill="none"
      stroke="url(#coreGrad)"
      stroke-width="6"
      stroke-linejoin="round"
    />
    <!-- Inner hex “bus” -->
    <polygon
      points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"
      fill="rgba(15,23,42,0.9)"
      stroke="#1f2937"
      stroke-width="3"
    />
  </g>

  <!-- AI orb / agent eye -->
  <g transform="translate(130,120)">
    <circle r="34" fill="url(#orbGrad)" />
    <circle r="16" fill="#020617" />
    <circle r="7"  fill="#38bdf8" />
    <circle r="3"  fill="#e0f2fe" />
  </g>

  <!-- π trace (subtle orbit) -->
  <g transform="translate(130,120)">
    <ellipse rx="52" ry="22" fill="none" stroke="#38bdf8" stroke-width="1.4" stroke-dasharray="4 6" opacity="0.7"/>
    <text x="-10" y="-30" fill="#e5e7eb" font-size="14" font-family="monospace">π</text>
  </g>

  <!-- MX2LM label -->
  <g transform="translate(130,210)" text-anchor="middle">
    <text
      x="0"
      y="0"
      fill="#f9fafb"
      font-size="22"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Mono', monospace"
      letter-spacing="4"
    >
      MX2LM
    </text>
    <text
      x="0"
      y="18"
      fill="#9ca3af"
      font-size="11"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Mono', monospace"
      letter-spacing="2"
    >
      MICRONAUT AI AGENT • CLI CORE
    </text>
  </g>
</svg>
