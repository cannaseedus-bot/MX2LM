<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
  <defs>
    <!-- Neon glow -->
    <filter id="glowA" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="0 0 0 0 0.09
                0 0 0 0 0.95
                0 0 0 0 0.67
                0 0 0 0.95 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowB" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="0 0 0 0 0.00
                0 0 0 0 0.95
                0 0 0 0 1.00
                0 0 0 0.85 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>

    <!-- Subtle grid -->
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#132338" stroke-width="1"/>
      <path d="M22 0V44M0 22H44" fill="none" stroke="#0e1828" stroke-width="1"/>
    </pattern>

    <!-- Gradient borders -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16f2aa" stop-opacity="0.65"/>
      <stop offset="0.55" stop-color="#00f5ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9c88ff" stop-opacity="0.55"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16f2aa"/>
      <stop offset="0.6" stop-color="#00f5ff"/>
      <stop offset="1" stop-color="#9c88ff"/>
    </linearGradient>

    <!-- Typography -->
    <style>
      .bg { fill:#070b12; }
      .grid { fill:url(#grid); opacity:0.65; }
      .frame { fill:#0a0f1c; stroke:url(#borderGrad); stroke-width:2; rx:22; }
      .panel { fill:#0b1322; stroke:#1a2b44; stroke-width:1.5; rx:18; }
      .panel2 { fill:#0a1020; stroke:#1a2b44; stroke-width:1.5; rx:18; }
      .cap { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; font-size:12px; letter-spacing:2.2px; fill:#7a8699; }
      .h1 { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; font-weight:800; font-size:30px; fill:url(#titleGrad); }
      .h2 { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; font-weight:700; font-size:16px; fill:#e8f5ff; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size:13px; fill:#cfe6ff; }
      .body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; font-size:14px; fill:#cfe6ff; }
      .muted { fill:#7a8699; }
      .neonA { stroke:#16f2aa; }
      .neonB { stroke:#00f5ff; }
      .neonC { stroke:#9c88ff; }
      .rule { stroke:#1d3352; stroke-width:1; }
      .chip { fill:#0b1a2b; stroke:#1e3a5c; stroke-width:1; rx:999; }
      .chipText { font-family: ui-monospace, Menlo, Consolas, monospace; font-size:12px; fill:#e8f5ff; }
      .warn { fill:#ff6b6b; }
      .ok { fill:#16f2aa; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1400" height="800"/>
  <rect class="grid" x="0" y="0" width="1400" height="800"/>

  <!-- Outer frame -->
  <rect x="36" y="28" width="1328" height="744" class="frame" filter="url(#shadowSoft)"/>

  <!-- Header -->
  <g transform="translate(64,62)">
    <!-- Neon emblem -->
    <g filter="url(#glowA)">
      <circle cx="18" cy="18" r="10" fill="none" stroke="#16f2aa" stroke-width="2.2"/>
      <path d="M18 3v30M3 18h30" stroke="#00f5ff" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M8 8l20 20M28 8L8 28" stroke="#9c88ff" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
    </g>

    <text class="cap" x="52" y="12">Ω BLACK PANEL</text>
    <text class="h1" x="52" y="44">ASX ⊗ π-K’UHUL ⊗ XCFE</text>
    <text class="body muted" x="52" y="68">Dashboard Law Sheet • sealed invariants • replayable truth</text>

    <!-- Law chip row -->
    <g transform="translate(0,92)">
      <rect class="chip" x="0" y="0" width="418" height="30"/>
      <text class="chipText" x="14" y="20">Ω-LAW: ASX = XCFE = XJSON = K’UHUL = AST</text>

      <rect class="chip" x="436" y="0" width="410" height="30"/>
      <text class="chipText" x="450" y="20">UI is shadow • State is substance</text>

      <rect class="chip" x="864" y="0" width="370" height="30"/>
      <text class="chipText" x="878" y="20">Truth = replayability</text>
    </g>

    <line class="rule" x1="0" y1="142" x2="1240" y2="142"/>
  </g>

  <!-- Main panels -->
  <!-- Left column: Laws 1-4 -->
  <g transform="translate(64,230)">
    <rect class="panel" x="0" y="0" width="640" height="510"/>

    <!-- Section title -->
    <g transform="translate(24,26)">
      <text class="h2">1–4 • CORE LAWS</text>
      <line class="rule" x1="0" y1="18" x2="590" y2="18"/>
    </g>

    <!-- Law 1 -->
    <g transform="translate(24,68)">
      <g filter="url(#glowA)">
        <text class="mono" x="0" y="0" dominant-baseline="hanging">
          <tspan class="ok">1</tspan><tspan>  ASX RAM (Ω-State)</tspan>
        </text>
      </g>
      <text class="body muted" x="0" y="26">Only authoritative state during execution.</text>
      <text class="mono" x="0" y="52">Invariants: volatile • symbolic • deterministic • non-persistent • tick-scoped</text>
      <line class="rule" x1="0" y1="78" x2="592" y2="78"/>
    </g>

    <!-- Law 2 -->
    <g transform="translate(24,160)">
      <g filter="url(#glowB)">
        <text class="mono" x="0" y="0" dominant-baseline="hanging">
          <tspan fill="#00f5ff">2</tspan><tspan>  Tick Law (Ω-Time)</tspan>
        </text>
      </g>
      <text class="mono" x="0" y="28">perceive → represent → reason → decide → act → reflect → collapse</text>
      <text class="body muted" x="0" y="54">Phases are exclusive • order is irreversible • collapse seals + wipes.</text>
      <line class="rule" x1="0" y1="82" x2="592" y2="82"/>
    </g>

    <!-- Law 3 -->
    <g transform="translate(24,258)">
      <g filter="url(#glowA)">
        <text class="mono" x="0" y="0" dominant-baseline="hanging">
          <tspan fill="#9c88ff">3</tspan><tspan>  XCFE (Ω-Governance)</tspan>
        </text>
      </g>
      <text class="body muted" x="0" y="26">Law, not logic: @if/@then/@else • phase legality • variable domains • validation.</text>
      <text class="mono" x="0" y="52">Outside XCFE ⇒ invalid by definition.</text>
      <line class="rule" x1="0" y1="78" x2="592" y2="78"/>
    </g>

    <!-- Law 4 -->
    <g transform="translate(24,350)">
      <g filter="url(#glowB)">
        <text class="mono" x="0" y="0" dominant-baseline="hanging">
          <tspan fill="#16f2aa">4</tspan><tspan>  π-K’UHUL (Ω-Mutation)</tspan>
        </text>
      </g>
      <text class="body muted" x="0" y="26">Pure math. Emits mutation patches only. Deterministic RNG. Phase-gated (act).</text>
      <text class="mono" x="0" y="52">Ops: set | merge | del | inc | dec | clamp | map</text>
    </g>

    <!-- Footer note -->
    <g transform="translate(24,462)">
      <rect x="0" y="0" width="592" height="36" rx="12" fill="#08101d" stroke="#1a2b44" stroke-width="1"/>
      <text class="body muted" x="14" y="24">If it’s not in ASX RAM, it’s not real.</text>
    </g>
  </g>

  <!-- Right column: Laws 5-9 + Seal -->
  <g transform="translate(736,230)">
    <rect class="panel2" x="0" y="0" width="628" height="510"/>

    <g transform="translate(24,26)">
      <text class="h2">5–9 • PROJECTION • PROOF • SCALE</text>
      <line class="rule" x1="0" y1="18" x2="580" y2="18"/>
    </g>

    <!-- Law 5 -->
    <g transform="translate(24,68)">
      <g filter="url(#glowA)">
        <text class="mono" x="0" y="0" dominant-baseline="hanging">
          <tspan fill="#00f5ff">5</tspan><tspan>  Projection (Ω-View)</tspan>
        </text>
      </g>
      <text class="body muted" x="0" y="26">UI reads state; state never reads UI.</text>
      <text class="mono" x="0" y="52">Targets: CSS vars • classes • data-* attributes</text>
      <line class="rule" x1="0" y1="78" x2="580" y2="78"/>
    </g>

    <!-- Law 6 -->
    <g transform="translate(24,160)">
      <g filter="url(#glowB)">
        <text class="mono" x="0" y="0" dominant-baseline="hanging">
          <tspan fill="#9c88ff">6</tspan><tspan>  Replay & Proof (Ω-Truth)</tspan>
        </text>
      </g>
      <text class="body muted" x="0" y="26">Truth is replayability: patches replay → hashes recompute → state matches.</text>
      <text class="mono" x="0" y="52">state_hash → tick_hash → epoch_hash</text>
      <line class="rule" x1="0" y1="78" x2="580" y2="78"/>
    </g>

    <!-- Law 7 -->
    <g transform="translate(24,258)">
      <g filter="url(#glowA)">
        <text class="mono" x="0" y="0" dominant-baseline="hanging">
          <tspan fill="#16f2aa">7</tspan><tspan>  Clusters (Ω-Scale)</tspan>
        </text>
      </g>
      <text class="body muted" x="0" y="26">Parallel regions under the same law; merge only at collapse.</text>
      <text class="mono" x="0" y="52">No shared mutation • No bypass • Same gates</text>
      <line class="rule" x1="0" y1="78" x2="580" y2="78"/>
    </g>

    <!-- Law 8 -->
    <g transform="translate(24,350)">
      <g filter="url(#glowB)">
        <text class="mono" x="0" y="0" dominant-baseline="hanging">
          <tspan class="warn">8</tspan><tspan>  Forbidden Zones (Ω-Exclusions)</tspan>
        </text>
      </g>
      <text class="mono" x="0" y="28">neural tensors • implicit state • UI-driven logic • nondeterminism • side-channels</text>
    </g>

    <!-- Seal / Quote -->
    <g transform="translate(24,430)">
      <rect x="0" y="0" width="580" height="60" rx="16" fill="#07101d" stroke="url(#borderGrad)" stroke-width="1.5"/>
      <g filter="url(#glowA)">
        <text class="body" x="16" y="26">“K’UHUL is not code that runs intelligence.”</text>
        <text class="body" x="16" y="46">“It is the law that allows intelligence to condense.”</text>
      </g>
    </g>
  </g>

  <!-- Bottom status bar -->
  <g transform="translate(64,748)">
    <line class="rule" x1="0" y1="0" x2="1240" y2="0"/>
    <text class="cap" x="0" y="28">Ω-LAW.BLACK_PANEL.v1 • SEALED</text>
    <text class="cap" x="1030" y="28">DASHBOARD PANEL • SVG</text>

    <!-- Tiny pulse indicator -->
    <g transform="translate(980,18)" filter="url(#glowB)">
      <circle cx="0" cy="10" r="4" fill="#00f5ff"/>
      <circle cx="20" cy="10" r="4" fill="#16f2aa" opacity="0.85"/>
      <circle cx="40" cy="10" r="4" fill="#9c88ff" opacity="0.85"/>
    </g>
  </g>

  <!-- Corner accents -->
  <g opacity="0.9" filter="url(#glowA)">
    <path d="M54 66h38" stroke="#16f2aa" stroke-width="3" stroke-linecap="round"/>
    <path d="M54 66v38" stroke="#00f5ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M1346 66h-38" stroke="#16f2aa" stroke-width="3" stroke-linecap="round"/>
    <path d="M1346 66v38" stroke="#00f5ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M54 734h38" stroke="#16f2aa" stroke-width="3" stroke-linecap="round"/>
    <path d="M54 734v-38" stroke="#00f5ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M1346 734h-38" stroke="#16f2aa" stroke-width="3" stroke-linecap="round"/>
    <path d="M1346 734v-38" stroke="#00f5ff" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>

