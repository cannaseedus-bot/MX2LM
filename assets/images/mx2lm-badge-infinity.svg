<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradInf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="coreGradInf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="orbGradInf" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f9fafb" stop-opacity="1"/>
      <stop offset="40%" stop-color="#e5e7eb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="softShadowInf" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="260" height="260" rx="32" fill="url(#bgGradInf)"/>

  <!-- Hex frame -->
  <g transform="translate(130,130)" filter="url(#softShadowInf)">
    <polygon
      points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45"
      fill="none"
      stroke="url(#coreGradInf)"
      stroke-width="6"
      stroke-linejoin="round"
    />
    <polygon
      points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"
      fill="rgba(15,23,42,0.9)"
      stroke="#1f2937"
      stroke-width="3"
    />
  </g>

  <!-- Orb -->
  <g transform="translate(130,120)">
    <circle r="34" fill="url(#orbGradInf)" />
    <circle r="16" fill="#020617" />
  </g>

  <!-- ∞ core -->
  <g transform="translate(130,120)" text-anchor="middle">
    <text
      x="0"
      y="8"
      fill="#e5e7eb"
      font-size="30"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Mono', monospace"
    >
      ∞
    </text>
  </g>

  <!-- Label -->
  <g transform="translate(130,210)" text-anchor="middle">
    <text
      x="0"
      y="0"
      fill="#f9fafb"
      font-size="18"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Mono', monospace"
      letter-spacing="4"
    >
      ∞-STACK
    </text>
    <text
      x="0"
      y="18"
      fill="#9ca3af"
      font-size="11"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Mono', monospace"
      letter-spacing="2"
    >
      UNBOUNDED MODEL • SWARM RUNTIME
    </text>
  </g>
</svg>
